  <path d="M60,170 Q100,140 150,145 Q200,140 240,170 L240,220 Q200,200 150,205 Q100,200 60,220 Z" fill="url(#chocFlow)" opacity="0.9"/>
  <path d="M80,190 Q120,175 150,178 Q180,175 220,190" stroke="#c87020" stroke-width="2" fill="none" opacity="0.6"/>
  <rect x="35" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="259" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.06)"/>
