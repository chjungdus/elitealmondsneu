  <text x="150" y="122" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">Elite</text>
  <text x="150" y="142" font-family="Arial,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">SWEET · SALTY · ELITE</text>
  <!-- Product visual -->
  <circle cx="150" cy="270" r="60" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <ellipse cx="150" cy="267" rx="42" ry="32" fill="url(#almondGrad)" transform="rotate(-15,150,267)"/>
  <ellipse cx="150" cy="267" rx="26" ry="19" fill="#c87020" transform="rotate(-15,150,267)"/>
  <ellipse cx="150" cy="267" rx="14" ry="10" fill="#c8a870" transform="rotate(-15,150,267)"/>
  <ellipse cx="150" cy="267" rx="7" ry="4" fill="#e8c890" transform="rotate(-15,150,267)"/>
