<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bag" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b1528"/>
      <stop offset="100%" stop-color="#c0152a"/>
    </linearGradient>
    <linearGradient id="almondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c04050"/>
      <stop offset="100%" stop-color="#7a0015"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="150" cy="396" rx="100" ry="7" fill="rgba(0,0,0,0.5)"/>
  <!-- Bag body -->
  <rect x="35" y="15" width="230" height="368" rx="26" fill="url(#bag)"/>
  <!-- Bag left edge highlight -->
  <rect x="35" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.04)"/>
  <!-- Bag right edge highlight -->
  <rect x="259" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.04)"/>
  <!-- Top seal -->
  <rect x="35" y="15" width="230" height="30" rx="26" fill="#1e1e1e"/>
  <!-- Hang hole -->
  <circle cx="150" cy="30" r="8" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <!-- Decorative line top -->
  <line x1="60" y1="65" x2="240" y2="65" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- ALMOND ELITE text -->
  <text x="150" y="100" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#f0ebe0" text-anchor="middle" letter-spacing="5">ALMOND</text>
  <text x="150" y="128" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#f0ebe0" text-anchor="middle" letter-spacing="5">ELITE</text>
  <text x="150" y="148" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="3">SWEET · SALTY · ELITE</text>
  <!-- Decorative line -->
  <line x1="60" y1="162" x2="240" y2="162" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Product visual circle -->
  <circle cx="150" cy="235" r="62" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Chocolate coating -->
  <ellipse cx="150" cy="232" rx="44" ry="34" fill="url(#almondGrad)" transform="rotate(-18,150,232)"/>
  <!-- Inner highlight -->
  <ellipse cx="150" cy="232" rx="28" ry="20" fill="#d0204a" transform="rotate(-18,150,232)"/>
  <!-- Almond center -->
  <ellipse cx="150" cy="232" rx="16" ry="11" fill="#c8a870" transform="rotate(-18,150,232)"/>
  <ellipse cx="150" cy="232" rx="8" ry="5" fill="#e8c890" transform="rotate(-18,150,232)"/>
  <!-- Strawberry decoration -->
  <circle cx="190" cy="195" r="10" fill="#e02040"/>
  <circle cx="110" cy="200" r="7" fill="#c01830"/>
  <!-- Flavor stripe bottom -->
  <rect x="35" y="307" width="230" height="76" rx="26" fill="url(#stripe)"/>
  <rect x="35" y="307" width="230" height="20" fill="url(#stripe)"/>
  <!-- Flavor text -->
  <text x="150" y="340" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">Strawberry</text>
  <text x="150" y="358" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">Sensation</text>
  <!-- Weight badge -->
  <rect x="115" y="278" width="70" height="20" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <text x="150" y="293" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">120g</text>
</svg>
