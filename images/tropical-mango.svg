<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bag" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d4700a"/>
      <stop offset="100%" stop-color="#7a3a00"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8900a"/>
      <stop offset="100%" stop-color="#f5b030"/>
    </linearGradient>
    <linearGradient id="almondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d080"/>
      <stop offset="100%" stop-color="#c8a040"/>
    </linearGradient>
  </defs>
  <ellipse cx="150" cy="396" rx="100" ry="7" fill="rgba(0,0,0,0.5)"/>
  <rect x="35" y="15" width="230" height="368" rx="26" fill="url(#bag)"/>
  <!-- Mango colored top panel -->
  <rect x="35" y="15" width="230" height="180" rx="26" fill="url(#top)"/>
  <rect x="35" y="150" width="230" height="50" fill="url(#top)"/>
  <rect x="35" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="259" y="40" width="6" height="318" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="35" y="15" width="230" height="30" rx="26" fill="#e8900a"/>
  <circle cx="150" cy="30" r="8" fill="#c8700a" stroke="#a85800" stroke-width="1"/>
  <line x1="60" y1="65" x2="240" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Fruit decorations in header -->
  <circle cx="75" cy="120" r="22" fill="#f5c030" opacity="0.9"/>
  <circle cx="75" cy="120" r="14" fill="#f5d860" opacity="0.8"/>
  <circle cx="225" cy="115" r="18" fill="#e8401a" opacity="0.8"/>
  <circle cx="225" cy="115" r="11" fill="#f06030" opacity="0.8"/>
  <text x="150" y="96" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">Almond</text>
  <text x="150" y="122" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">Elite</text>
  <!-- Orange flavor band -->
  <rect x="35" y="190" width="230" height="28" fill="#e8701a"/>
  <rect x="35" y="190" width="230" height="28" fill="rgba(0,0,0,0.15)"/>
  <text x="150" y="209" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">TROPICAL MANGO</text>
  <!-- Product visual on dark section -->
  <circle cx="150" cy="290" r="58" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <ellipse cx="150" cy="287" rx="40" ry="30" fill="url(#almondGrad)" transform="rotate(-15,150,287)"/>
  <ellipse cx="150" cy="287" rx="24" ry="18" fill="#f0e090" transform="rotate(-15,150,287)"/>
  <ellipse cx="150" cy="287" rx="13" ry="9" fill="#c8a870" transform="rotate(-15,150,287)"/>
  <ellipse cx="150" cy="287" rx="6" ry="4" fill="#e8c890" transform="rotate(-15,150,287)"/>
  <!-- Mango slice decoration -->
  <ellipse cx="192" cy="255" rx="12" ry="8" fill="#f5c030" opacity="0.8" transform="rotate(-20,192,255)"/>
  <rect x="115" y="348" width="70" height="20" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <text x="150" y="363" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">120g</text>
</svg>
